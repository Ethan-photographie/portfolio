<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projet — Ethan_photographie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0B0D; --ink-2:#151619; --paper:#F5F3EF; --paper-soft:#EDE9E1; --muted:#8B8A85;
    --auto:#FF5A32; --portrait:#FF3D8A; --nature:#20E39E; --event:#7C6BFF;
    --spectrum: linear-gradient(90deg, var(--auto), var(--portrait), var(--event), var(--nature));
    --accent: var(--auto);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--ink); color:var(--paper); font-family:'Inter', sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased;}
  h1,h2{font-family:'Archivo Expanded', sans-serif; letter-spacing:-0.01em;}
  a{color:inherit; text-decoration:none;}
  .mono{font-family:'Space Mono', monospace;}
  .wrap{max-width:1200px; margin:0 auto; padding:0 36px;}

  header{position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(10,11,13,0.96); backdrop-filter:blur(8px); border-bottom:1px solid rgba(245,243,239,0.1);}
  nav{display:flex; align-items:center; justify-content:space-between; padding:28px 36px; max-width:1200px; margin:0 auto;}
  .logo{font-family:'Archivo Expanded'; font-weight:800; font-size:1rem; letter-spacing:0.05em;}
  .nav-links{display:flex; gap:44px; list-style:none; font-size:0.82rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;}
  .nav-links a{position:relative; padding:4px 0;}
  .nav-links a::after{content:''; position:absolute; left:0; bottom:0; height:2px; width:0; background:var(--spectrum); transition:width .25s ease;}
  .nav-links a:hover::after, .nav-links a.active::after{width:100%;}
  .menu-toggle{display:none; background:none; border:none; font-size:1.4rem; color:var(--paper); cursor:pointer;}

  .page-spacer{height:114px;}
  section.page{padding:0 0 130px;}

  .back-link{
    display:inline-flex; align-items:center; gap:8px; font-family:'Space Mono'; font-size:0.8rem;
    color:var(--muted); margin-bottom:34px; transition:color .2s ease;
  }
  .back-link:hover{color:var(--paper);}

  .proj-head{margin-bottom:52px; display:flex; align-items:flex-end; justify-content:space-between; gap:24px; flex-wrap:wrap;}
  .proj-head h1{font-size:clamp(2.2rem,5vw,4rem); font-weight:800; text-transform:uppercase;}
  .proj-cat{
    display:inline-flex; align-items:center; gap:8px; font-family:'Space Mono'; font-size:0.8rem;
    text-transform:uppercase; letter-spacing:0.05em; color:var(--paper-soft);
  }
  .proj-cat .sw{width:8px; height:8px; border-radius:50%; background:var(--accent);}

  .gallery{display:grid; grid-template-columns:repeat(3, 1fr); gap:6px;}
  .g-item{position:relative; aspect-ratio:4/5; overflow:hidden; cursor:zoom-in; border-radius:2px;}
  .g-item img{width:100%; height:100%; object-fit:cover; display:block; transition:transform .5s ease;}
  .g-item:hover img{transform:scale(1.05);}

  .empty-state{
    padding:60px 0; color:var(--muted); font-family:'Space Mono'; font-size:0.9rem;
    border:1px dashed rgba(245,243,239,0.2); border-radius:4px; text-align:center;
  }

  /* Visionneuse plein écran */
  .lightbox{
    position:fixed; inset:0; z-index:300; background:rgba(10,11,13,0.97);
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .lightbox.active{opacity:1; pointer-events:auto;}
  .lightbox img{max-width:88vw; max-height:84vh; object-fit:contain; border-radius:2px; box-shadow:0 30px 80px rgba(0,0,0,0.6);}
  .lb-close, .lb-prev, .lb-next{
    position:absolute; background:none; border:none; color:var(--paper); cursor:pointer;
    font-family:'Space Mono'; font-size:1.6rem; padding:14px; opacity:0.75; transition:opacity .2s ease;
  }
  .lb-close:hover, .lb-prev:hover, .lb-next:hover{opacity:1;}
  .lb-close{top:20px; right:24px;}
  .lb-prev{left:10px; top:50%; transform:translateY(-50%); font-size:2.2rem;}
  .lb-next{right:10px; top:50%; transform:translateY(-50%); font-size:2.2rem;}
  .lb-count{position:absolute; bottom:24px; left:50%; transform:translateX(-50%); font-family:'Space Mono'; font-size:0.78rem; color:var(--paper-soft); opacity:0.75;}

  footer{padding:34px 0; text-align:center; font-family:'Space Mono'; font-size:0.75rem; color:#55534E; background:var(--ink); border-top:1px solid rgba(245,243,239,0.08);}

  @media (max-width:860px){
    .nav-links{display:none;} .menu-toggle{display:block;}
    .gallery{grid-template-columns:repeat(2, 1fr);}
  }
  @media (max-width:560px){ .gallery{grid-template-columns:1fr;} }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<header>
  <nav>
    <div class="logo">ETHAN_PHOTOGRAPHIE</div>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="projets.html" class="active">Projets</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="menu-toggle">☰</button>
  </nav>
</header>

<div class="page-spacer"></div>

<section class="page">
  <div class="wrap">
    <a href="projets.html" class="back-link">← Tous les projets</a>

    <div class="proj-head">
      <h1 id="projTitle">Chargement…</h1>
      <span class="proj-cat"><span class="sw" id="projSwatch"></span><span id="projCat"></span></span>
    </div>

    <div id="gallery" class="gallery"></div>
    <div id="emptyState" class="empty-state" style="display:none;">
      Aucune photo trouvée pour ce projet pour l'instant.<br>
      Ajoutez vos images dans <code class="mono" id="emptyPath"></code>.
    </div>
  </div>
</section>

<footer>© 2026 Ethan_photographie — Tous droits réservés</footer>

<!-- Visionneuse plein écran -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-prev" id="lbPrev">‹</button>
  <img id="lbImg" src="" alt="">
  <button class="lb-next" id="lbNext">›</button>
  <span class="lb-count" id="lbCount"></span>
</div>

<script>
  // ===== Données des projets =====
  // Pour ajouter un nouveau projet : ajoutez une entrée ici avec le même "slug"
  // que celui utilisé dans le lien depuis projets.html (?p=slug), puis déposez
  // ses photos dans images/projets/<slug>/ nommées 1.jpg, 2.jpg, 3.jpg, etc.
  const PROJECTS = {
    'vignette 1': { title: 'Rallye du Pyla',      cat: 'Voiture & Moto',     color: 'var(--auto)' },
    'vignette 2': { title: "Lumière du jour",        cat: 'Portrait & Voiture',           color: 'var(--portrait)' },
    'vignette 3': { title: 'Aube sur les crêtes',      cat: 'Paysage & Nature',   color: 'var(--nature)' },
    'vignette 4': { title: 'Nuit électrique',          cat: 'Événementiel',       color: 'var(--event)' },
    'vignette 5': { title: 'Brume matinale',           cat: 'Paysage & Nature',   color: 'var(--nature)' },
    'vignette 6': { title: 'Deux roues, un horizon',   cat: 'Voiture & Moto',     color: 'var(--auto)' },
    'vignette 7': { title: 'Regard franc',             cat: 'Portrait',           color: 'var(--portrait)' },
    'vignette 8': { title: 'Premier bal',              cat: 'Événementiel',       color: 'var(--event)' },
    'vignette 9': { title: 'Mécanique brute',          cat: 'Voiture & Moto',     color: 'var(--auto)' },
  };
  const MAX_PHOTOS = 30; // nombre maximum de photos testées par projet (1.jpg à 30.jpg)

  const slug = new URLSearchParams(location.search).get('p');
  const data = PROJECTS[slug];

  const titleEl = document.getElementById('projTitle');
  const catEl = document.getElementById('projCat');
  const swatchEl = document.getElementById('projSwatch');
  const galleryEl = document.getElementById('gallery');
  const emptyEl = document.getElementById('emptyState');
  const emptyPathEl = document.getElementById('emptyPath');

  if (!data) {
    titleEl.textContent = 'Projet introuvable';
    catEl.textContent = '';
  } else {
    titleEl.textContent = data.title;
    catEl.textContent = data.cat;
    swatchEl.style.background = data.color;
    document.documentElement.style.setProperty('--accent', data.color);
    document.title = data.title + ' — Ethan_photographie';
    emptyPathEl.textContent = `images/projets/${slug}/`;

    // On teste chaque image candidate ; seules celles qui existent vraiment sont affichées.
    const candidates = Array.from({ length: MAX_PHOTOS }, (_, i) => `images/projets/${slug}/${i + 1}.jpg`);
    Promise.all(candidates.map(src => new Promise(resolve => {
      const img = new Image();
      img.onload = () => resolve(src);
      img.onerror = () => resolve(null);
      img.src = src;
    }))).then(results => {
      const valid = results.filter(Boolean);
      if (valid.length === 0) {
        emptyEl.style.display = 'block';
        return;
      }
      valid.forEach((src, i) => {
        const item = document.createElement('div');
        item.className = 'g-item';
        item.innerHTML = `<img src="${src}" alt="${data.title} — photo ${i + 1}">`;
        item.addEventListener('click', () => openLightbox(valid, i));
        galleryEl.appendChild(item);
      });
    });
  }

  // ===== Visionneuse plein écran =====
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbCount = document.getElementById('lbCount');
  let currentImages = [];
  let currentIndex = 0;

  function openLightbox(images, index) {
    currentImages = images;
    currentIndex = index;
    updateLightbox();
    lightbox.classList.add('active');
  }
  function updateLightbox() {
    lbImg.src = currentImages[currentIndex];
    lbCount.textContent = `${currentIndex + 1} / ${currentImages.length}`;
  }
  function closeLightbox() { lightbox.classList.remove('active'); }
  function nextImage() { currentIndex = (currentIndex + 1) % currentImages.length; updateLightbox(); }
  function prevImage() { currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length; updateLightbox(); }

  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbNext').addEventListener('click', nextImage);
  document.getElementById('lbPrev').addEventListener('click', prevImage);
  lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') nextImage();
    if (e.key === 'ArrowLeft') prevImage();
  });
</script>

</body>
</html>
