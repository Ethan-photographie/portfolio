<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ethan_photographie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0B0D; --ink-2:#151619; --paper:#F5F3EF; --paper-soft:#EDE9E1; --muted:#8B8A85;
    --auto:#FF5A32; --portrait:#FF3D8A; --nature:#20E39E; --event:#7C6BFF;
    --spectrum: linear-gradient(90deg, var(--auto), var(--portrait), var(--event), var(--nature));
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{background:var(--ink); color:var(--paper); font-family:'Inter', sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; overflow:hidden;}
  h1{font-family:'Archivo Expanded', sans-serif; letter-spacing:-0.01em;}
  a{color:inherit; text-decoration:none;}
  .mono{font-family:'Space Mono', monospace;}

  header{position:fixed; top:0; left:0; right:0; z-index:100;}
  nav{display:flex; align-items:center; justify-content:space-between; padding:28px 36px; max-width:1200px; margin:0 auto;}
  .logo{font-family:'Archivo Expanded'; font-weight:800; font-size:1rem; letter-spacing:0.05em;}
  .nav-links{display:flex; gap:44px; list-style:none; font-size:0.82rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;}
  .nav-links a{position:relative; padding:4px 0;}
  .nav-links a::after{content:''; position:absolute; left:0; bottom:0; height:2px; width:0; background:var(--spectrum); transition:width .25s ease;}
  .nav-links a:hover::after, .nav-links a.active::after{width:100%;}
  .menu-toggle{display:none; background:none; border:none; font-size:1.4rem; color:var(--paper); cursor:pointer;}

  .home{
    position:relative; height:100vh; width:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:0 24px;
    /* Photo de fond : images/hero.jpg — format paysage, haute résolution (min. 1920px) recommandé */
    background:url('images/background.jpg') center / cover no-repeat;
  }
  .home::before{content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(10,11,13,0.55) 0%, rgba(10,11,13,0.35) 45%, rgba(10,11,13,0.75) 100%);}
  .home-content{position:relative; z-index:1; max-width:680px;}
  .home h1{font-size:clamp(2.6rem, 7vw, 5.2rem); font-weight:800; text-transform:uppercase; line-height:0.98; margin-bottom:24px;}
  .home p{font-size:1.08rem; color:var(--paper-soft); margin-bottom:40px;}
  .home .btn{
    display:inline-flex; align-items:center; gap:10px; padding:16px 32px; border:1px solid var(--paper); border-radius:2px;
    font-weight:700; font-size:0.85rem; letter-spacing:0.05em; text-transform:uppercase; transition:all .2s ease;
  }
  .home .btn:hover{background:var(--paper); color:var(--ink);}

  @media (max-width:860px){ .nav-links{display:none;} .menu-toggle{display:block;} }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>

<header>
  <nav>
    <div class="logo">ETHAN_PHOTOGRAPHIE</div>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Accueil</a></li>
      <li><a href="projets.html">Projets</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="menu-toggle">☰</button>
  </nav>
</header>

<section class="home">
  <div class="home-content">
    <h1>Ethan_<br>photographie</h1>
    <p>Photographe indépendant — automobile &amp; moto, portrait, paysage et événementiel. Je capture la vitesse, les visages et les silences, à la recherche d'une lumière qui raconte quelque chose de vrai.</p>
    <a href="projets.html" class="btn">Voir mes projets</a>
  </div>
</section>

</body>
</html>
